name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.91"
  FOUNDRY_PROFILE: default

jobs:
  # ── Solidity ──────────────────────────────────────────────────────────────
  forge:
    name: Forge build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install Soldeer deps
        run: forge soldeer install

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

      - name: Fuzz (256 runs)
        run: forge test --match-path "contracts/test/fuzz/*" -vvv

  # ── Rust ──────────────────────────────────────────────────────────────────
  rust:
    name: Rust check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # sandbox-runtime is a sibling path dep (../../ai-agent-sandbox-blueprint/).
      # actions/checkout can't clone outside the workspace, so use git clone.
      - name: Clone sandbox-runtime sibling
        run: git clone --depth 1 https://github.com/tangle-network/ai-agent-sandbox-blueprint.git ../ai-agent-sandbox-blueprint

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check (all crates)
        run: cargo check --workspace

      - name: Test (trading-validator-lib)
        run: cargo test -p trading-validator-lib --lib

      - name: Test (trading-runtime)
        run: cargo test -p trading-runtime --lib

      - name: Test (trading-http-api)
        run: cargo test -p trading-http-api

      - name: Test (trading-blueprint-lib)
        run: cargo test -p trading-blueprint-lib --lib

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone sandbox-runtime sibling
        uses: actions/checkout@v4
        with:
          repository: tangle-network/ai-agent-sandbox-blueprint
          path: ../ai-agent-sandbox-blueprint

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone sandbox-runtime sibling
        run: git clone --depth 1 https://github.com/tangle-network/ai-agent-sandbox-blueprint.git ../ai-agent-sandbox-blueprint

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
