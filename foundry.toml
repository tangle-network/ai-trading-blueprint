[profile.default]
src = "contracts/src"
test = "contracts/test"
out = "contracts/out"
script = "contracts/script"
cache_path = "contracts/cache"
broadcast = "contracts/broadcast"
libs = ["dependencies"]
auto_detect_remappings = true
via_ir = true
optimizer = true
# Hyperliquid (and any EVM enforcing EIP-170 strictly) caps runtime bytecode
# at 24,576 B. Lower optimizer_runs trades a small amount of runtime gas for
# smaller deployment bytecode — TradingVault + VaultDeployer would otherwise
# blow the cap by several KB. The execute-path libraries (`ExecutionLib`,
# `EnvelopeExecLib`, `ValuationLib`) absorb the rest of the reduction.
optimizer_runs = 1

# Fork testing RPC endpoints. Set via env vars or .env file.
# Tests gated by `--fork-url` flag — unit tests never hit these.
[rpc_endpoints]
base = "${BASE_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"
mainnet = "${ETH_RPC_URL}"
hyperevm_testnet = "https://rpc.hyperliquid-testnet.xyz/evm"

[soldeer]
recursive_deps = true
remappings_location = "txt"
remappings_version = false

[dependencies]
tnt-core = "0.13.0"
forge-std = "1.9.6"
